name: golang-build-actions-workflow
on:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
      
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
    contents: write
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.3

    - uses: actions/setup-go@v6.4.0
      with:
        go-version: 1.25

    - name: install gok CLI
      run: |
        go install github.com/gokrazy/tools/cmd/gok@main
        echo "PATH=$PATH:$(go env GOPATH)/bin" >> $GITHUB_ENV

    - name: create new gokrazy instance
      run: gok new

    - name: add this program to the gokrazy instance
      run: gok add .

    - name: generate gokrazy disk image
      run: gok overwrite --root root.squashfs

    - run: ls -R
    
    - name: Archive Release
      uses: thedoctor0/zip-release@master
      with:
        type: 'zip'
        path: root.squashfs
        filename: "${{ github.event.repository.name }}-${{ github.ref_name }}.zip"
        
    - name: Release prebuilt
      uses: ncipollo/release-action@v1
      with:
        artifacts: "${{ github.event.repository.name }}-${{ github.ref_name }}.zip"
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
